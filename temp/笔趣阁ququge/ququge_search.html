// 解码数据
function decode(){
    try{
        // Base64解码
        const binaryString = atob(D);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        
        // 解压缩
        const decompressed = pako.inflate(bytes, { to: 'string' });
        
        // 解析JSON
        return JSON.parse(decompressed);
    }catch(e){
        console.error("解码错误:", e);
        // 如果解码失败，返回空数组
        return [];
    }
}

// 渲染列表
function render(novels, page = 1, perPage = 50){
    const start = (page - 1) * perPage;
    const end = Math.min(start + perPage, novels.length);
    const items = novels.slice(start, end);
    
    let html = '';
    for (let i = 0; i < items.length; i++) {
        const n = items[i];
        const statusText = n[3] === 'L' ? '连载' : '完结';
        html += `
            <div class="novel-item">
                <div class="novel-title">
                    <a href="${n[4]}" target="_blank">${n[1]}</a>
                </div>
                <div class="novel-meta">
                    作者：${n[2]} | 状态：${statusText} | ID：${n[0]}
                </div>
            </div>
        `;
    }
    
    document.getElementById("list").innerHTML = html || '<div style="text-align:center;padding:20px;color:#999">没有找到小说</div>';
    
    // 渲染分页
    const totalPages = Math.ceil(novels.length / perPage);
    let pagination = "";
    if (totalPages > 1) {
        // 显示最多10个页码
        const startPage = Math.max(1, page - 4);
        const endPage = Math.min(totalPages, page + 5);
        
        for (let i = startPage; i <= endPage; i++) {
            pagination += `<a href="#" class="page ${i === page ? 'active' : ''}" onclick="changePage(${i}); return false;">${i}</a>`;
        }
    }
    document.getElementById("pagination").innerHTML = pagination;
}

// 改变页码
function changePage(page){
    const novels = window.allNovels || [];
    render(novels, page);
    return false;
}

// 搜索
let searchTimer;
document.getElementById("search").addEventListener("input", function(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
        const keyword = this.value.toLowerCase().trim();
        const filtered = window.rawNovels.filter(n => {
            const title = (n[1] || '').toLowerCase();
            const author = (n[2] || '').toLowerCase();
            return title.includes(keyword) || author.includes(keyword);
        });
        
        window.allNovels = filtered;
        document.getElementById("count").textContent = filtered.length;
        render(filtered, 1);
    }, 300);
});

// 加载pako压缩库
function loadPako(){
    return new Promise((resolve) => {
        if (window.pako) {
            resolve();
            return;
        }
        
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/pako@2.0.4/dist/pako.min.js";
        script.onload = resolve;
        script.onerror = () => {
            console.error("加载pako失败，使用未压缩数据");
            // 如果pako加载失败，尝试直接使用Base64解码
            try {
                const decoded = atob(D);
                window.rawNovels = JSON.parse(decoded);
                window.allNovels = window.rawNovels;
                render(window.allNovels, 1);
            } catch(e) {
                console.error("直接解码失败:", e);
                document.getElementById("list").innerHTML = '<div style="text-align:center;padding:20px;color:red">加载数据失败，请刷新页面</div>';
            }
            resolve();
        };
        document.head.appendChild(script);
    });
}

// 初始化
window.addEventListener('DOMContentLoaded', function() {
    loadPako().then(() => {
        try {
            const data = decode();
            if (data && data.length > 0) {
                window.rawNovels = data;
                window.allNovels = data;
                document.getElementById("count").textContent = data.length;
                render(data, 1);
            } else {
                document.getElementById("list").innerHTML = '<div style="text-align:center;padding:20px;color:#999">没有小说数据</div>';
            }
        } catch(e) {
            console.error("初始化失败:", e);
            document.getElementById("list").innerHTML = '<div style="text-align:center;padding:20px;color:red">初始化失败: ' + e.message + '</div>';
        }
    });
});
